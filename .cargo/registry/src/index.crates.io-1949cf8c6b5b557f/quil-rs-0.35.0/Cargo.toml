    "cdylib",
    "rlib",
]
path = "src/lib.rs"

[[bin]]
name = "stub_gen"
path = "src/bin/stub_gen.rs"

[[example]]
name = "generate_test_expressions"
path = "examples/generate_test_expressions.rs"

[[test]]
name = "calibration_test"
path = "tests/calibration_test.rs"

[[bench]]
name = "corpus"
path = "benches/corpus.rs"

[[bench]]
name = "get_frames_for_instruction"
path = "benches/get_frames_for_instruction.rs"
