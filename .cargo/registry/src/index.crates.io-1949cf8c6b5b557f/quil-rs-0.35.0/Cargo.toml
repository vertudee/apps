[package]
edition = "2021"
rust-version = "1.83"
name = "quil-rs"
version = "0.35.0"
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust tooling for Quil (Quantum Instruction Language)"
readme = "README.md"
keywords = [
    "Quil",
    "Quantum",
    "Rigetti",
]
categories = [
    "parser-implementations",
    "science",
    "compilers",
    "emulators",
]
license = "Apache-2.0"
repository = "https://github.com/rigetti/quil-rs"

[features]
graphviz-dot = ["dep:dot-writer"]
python = [
    "dep:numpy",
    "dep:pyo3",
    "dep:pyo3-build-config",
    "dep:rigetti-pyo3",
]
stubs = [
    "python",
    "dep:pyo3-stub-gen",
    "rigetti-pyo3/stubs",
]
wasm-bindgen = []

[lib]
name = "quil_rs"
