[[bench]]
name = "parser"
path = "benches/parser.rs"
harness = false

[[bench]]
name = "scheduled_program_from_program"
path = "benches/scheduled_program_from_program.rs"
harness = false

[[bench]]
name = "simplification"
path = "benches/simplification.rs"
harness = false

